<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Collision Story</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="intro">
        <h1>Motor Vehicle Collisions i NYC</h1>
        <p>En fortælling om fare, byplanlægning og menneskeliv.</p>
        <div id="choice-container">
            <button>Fodgænger</button>
            <button>Cyklist</button>
            <button>Bilist</button>
        </div>
    </section>

    <main id="scrolly-container">
        
        <div class="sticky-graphic">
            <div id="plot-placeholder">
                <p>Grafikken bliver stående her...</p>
            </div>
        </div>

        <article class="scroll-text">
            <div class="step" data-step="1">
                <h3>Krydset ved Manhattan</h3>
                <p>Her ser vi de mest kritiske punkter...</p>
            </div>
            <div class="step" data-step="2">
                <h3>Tidspunktet betyder alt</h3>
                <p>Når mørket falder på, ændrer mønsteret sig...</p>
            </div>
        </article>

    </main>

    <script src="https://unpkg.com/scrollama"></script>
    <script src="script.js"></script>
</body>
</html>
